<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>moltpany 的作品</title>
    <meta name="description" content="moltpany 的个人作品主页，整理网页、地图、数据可视化和音乐相关项目。">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231e3a5f'/%3E%3Ctext x='16' y='22' font-size='17' text-anchor='middle' fill='%23ffffff' font-family='serif'%3Em%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="topbar" aria-label="主页导航">
        <a class="brand" href="/">moltpany</a>
        <div class="nav-links">
          <a href="#projects">作品</a>
          <a href="https://github.com/moltpany" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </nav>

      <section class="intro" aria-labelledby="home-title">
        <p class="eyebrow">Personal Works</p>
        <h1 id="home-title">作品主页</h1>
        <p class="intro-copy">这里集中展示我做过的网页、数据可视化、音乐地图和其他小型项目。每个作品都尽量保持可阅读、可维护，也方便继续扩展。</p>
      </section>
    </header>

    <main>
      <section class="projects-section" id="projects" aria-labelledby="projects-title">
        <div class="section-heading">
          <p class="eyebrow">Projects</p>
          <h2 id="projects-title">当前作品</h2>
        </div>

        <div class="project-grid">
          <article class="project-card">
            <a class="project-preview" href="projects/mozart-journey/" aria-label="打开 Mozart Journey">
              <span class="preview-map" aria-hidden="true">
                <span class="route route-one"></span>
                <span class="route route-two"></span>
                <span class="pin pin-salzburg"></span>
                <span class="pin pin-vienna"></span>
                <span class="pin pin-prague"></span>
              </span>
            </a>
            <div class="project-body">
              <p class="project-type">互动地图 · 音乐史</p>
              <h3>Mozart Journey</h3>
              <p>沿着欧洲城市、年份和作品，整理莫扎特的旅行足迹、代表作品、收藏曲目和参考来源。</p>
              <a class="project-link" href="projects/mozart-journey/">进入作品</a>
            </div>
          </article>

          <article class="project-card placeholder-card" aria-label="后续作品占位">
            <div class="placeholder-preview" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="project-body">
              <p class="project-type">Coming Soon</p>
              <h3>更多作品整理中</h3>
              <p>后续可以继续加入论文展示、实验可视化、报告页面或其他个人项目。</p>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 moltpany · 静态作品集主页</p>
    </footer>
  </body>
</html>
